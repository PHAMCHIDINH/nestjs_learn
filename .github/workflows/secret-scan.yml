name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Scan tracked files for committed secrets
        run: git ls-files | node scripts/scan-secrets.mjs
