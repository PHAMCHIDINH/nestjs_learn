services:
  postgres:
    image: postgres:16-alpine
    container_name: backend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_app
    command: sh -c "npm run start:prod:migrate"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-5}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001,http://127.0.0.1:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DATABASE_URL: postgresql://app_user:app_password@postgres:5432/app_db?schema=public
      JWT_SECRET: change-me-in-production
      MAIL_FROM: ${MAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FAMILY: ${SMTP_FAMILY:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-false}
      SMTP_CONNECTION_TIMEOUT: ${SMTP_CONNECTION_TIMEOUT:-10000}
      SMTP_GREETING_TIMEOUT: ${SMTP_GREETING_TIMEOUT:-10000}
      SMTP_SOCKET_TIMEOUT: ${SMTP_SOCKET_TIMEOUT:-15000}
      SMTP_DNS_TIMEOUT: ${SMTP_DNS_TIMEOUT:-10000}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FAIL_FAST: ${SMTP_FAIL_FAST:-false}
      SMTP_VERIFY_ON_STARTUP: ${SMTP_VERIFY_ON_STARTUP:-false}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-cho-sinh-vien/listings}
      CLOUDINARY_AVATAR_FOLDER: ${CLOUDINARY_AVATAR_FOLDER:-cho-sinh-vien/avatars}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
